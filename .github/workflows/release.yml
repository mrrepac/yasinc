name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Attest build provenance for release assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Use hand-written notes if release-notes/<tag>.md exists, else
          # auto-generate a changelog from commits since the previous tag.
          if [ -f "release-notes/$TAG.md" ]; then
            NOTES=(--notes-file "release-notes/$TAG.md")
          else
            NOTES=(--generate-notes)
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            "${NOTES[@]}" \
            main.js manifest.json styles.css
